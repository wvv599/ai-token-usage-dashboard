<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Token Usage dashboard preview</title>
  <desc id="desc">Privacy-safe mock preview of the local AI token usage dashboard with summary cards, source tabs, charts, and usage tables.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.55" stop-color="#0E1A2E"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="96" x2="1040" y2="624" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="20" y="20" width="1160" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .panel{fill:#0F172A;stroke:#243247;stroke-width:1.2}.panel2{fill:#111C31;stroke:#2A3A52;stroke-width:1}.muted{fill:#94A3B8}.text{fill:#E5E7EB}.white{fill:#F8FAFC}.cyan{fill:#38BDF8}.green{fill:#22C55E}.purple{fill:#A78BFA}.yellow{fill:#FBBF24}.red{fill:#FB7185}.grid{stroke:#243247;stroke-width:1}.bar{rx:6}.small{font:500 18px Inter,Segoe UI,Arial,sans-serif}.label{font:600 20px Inter,Segoe UI,Arial,sans-serif}.title{font:800 34px Inter,Segoe UI,Arial,sans-serif}.number{font:800 30px Inter,Segoe UI,Arial,sans-serif}.tiny{font:500 15px Inter,Segoe UI,Arial,sans-serif}.mono{font:600 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1030" cy="88" r="210" fill="#2563EB" opacity="0.16"/>
  <circle cx="130" cy="638" r="190" fill="#22C55E" opacity="0.10"/>
  <rect x="50" y="44" width="1100" height="632" rx="30" fill="#0B1220" opacity="0.72" filter="url(#shadow)"/>
  <rect x="50.5" y="44.5" width="1099" height="631" rx="29.5" stroke="url(#accent)" stroke-opacity="0.45"/>

  <g transform="translate(84 76)">
    <text class="title white" x="0" y="0" dominant-baseline="hanging">AI Token Usage</text>
    <text class="small muted" x="0" y="46">Local-first dashboard for Codex, OpenCode, Claude Code, Hermes, and custom JSONL sources</text>
    <rect x="806" y="0" width="210" height="40" rx="20" fill="#10243B" stroke="#1E3A5F"/>
    <circle cx="828" cy="20" r="7" fill="#22C55E"/>
    <text class="tiny text" x="844" y="20" dominant-baseline="middle">127.0.0.1 · private</text>
  </g>

  <g transform="translate(84 154)">
    <rect class="panel" x="0" y="0" width="186" height="104" rx="18"/>
    <text class="tiny muted" x="20" y="24">Total tokens</text>
    <text class="number white" x="20" y="68">18.4M</text>
    <text class="tiny green" x="124" y="68">+12%</text>

    <rect class="panel" x="206" y="0" width="186" height="104" rx="18"/>
    <text class="tiny muted" x="226" y="24">Input</text>
    <text class="number cyan" x="226" y="68">9.7M</text>

    <rect class="panel" x="412" y="0" width="186" height="104" rx="18"/>
    <text class="tiny muted" x="432" y="24">Cached</text>
    <text class="number purple" x="432" y="68">5.1M</text>

    <rect class="panel" x="618" y="0" width="186" height="104" rx="18"/>
    <text class="tiny muted" x="638" y="24">Output</text>
    <text class="number yellow" x="638" y="68">3.6M</text>

    <rect class="panel" x="824" y="0" width="208" height="104" rx="18"/>
    <text class="tiny muted" x="844" y="24">Sessions / requests</text>
    <text class="number white" x="844" y="68">246</text>
    <text class="tiny muted" x="920" y="68">/ 1,820</text>
  </g>

  <g transform="translate(84 288)">
    <rect class="panel" x="0" y="0" width="650" height="242" rx="22"/>
    <text class="label text" x="24" y="30">Daily usage</text>
    <text class="tiny muted" x="24" y="56">Synthetic preview data · no chat content</text>
    <line class="grid" x1="32" y1="184" x2="620" y2="184"/>
    <line class="grid" x1="32" y1="134" x2="620" y2="134"/>
    <line class="grid" x1="32" y1="84" x2="620" y2="84"/>
    <rect class="bar" x="64" y="136" width="36" height="48" fill="#38BDF8"/>
    <rect class="bar" x="124" y="112" width="36" height="72" fill="#38BDF8" opacity="0.9"/>
    <rect class="bar" x="184" y="88" width="36" height="96" fill="#8B5CF6"/>
    <rect class="bar" x="244" y="118" width="36" height="66" fill="#38BDF8" opacity="0.86"/>
    <rect class="bar" x="304" y="64" width="36" height="120" fill="#22C55E"/>
    <rect class="bar" x="364" y="96" width="36" height="88" fill="#8B5CF6" opacity="0.92"/>
    <rect class="bar" x="424" y="74" width="36" height="110" fill="#38BDF8"/>
    <rect class="bar" x="484" y="104" width="36" height="80" fill="#FBBF24"/>
    <rect class="bar" x="544" y="54" width="36" height="130" fill="#22C55E" opacity="0.94"/>
    <text class="tiny muted" x="60" y="216">Mon</text><text class="tiny muted" x="120" y="216">Tue</text><text class="tiny muted" x="180" y="216">Wed</text><text class="tiny muted" x="242" y="216">Thu</text><text class="tiny muted" x="308" y="216">Fri</text><text class="tiny muted" x="368" y="216">Sat</text><text class="tiny muted" x="428" y="216">Sun</text>
  </g>

  <g transform="translate(758 288)">
    <rect class="panel" x="0" y="0" width="326" height="242" rx="22"/>
    <text class="label text" x="24" y="30">Sources</text>
    <g transform="translate(24 62)">
      <rect class="panel2" x="0" y="0" width="278" height="34" rx="12"/><circle cx="18" cy="17" r="6" fill="#38BDF8"/><text class="tiny text" x="34" y="18" dominant-baseline="middle">Codex</text><text class="tiny muted" x="210" y="18" dominant-baseline="middle">6.2M</text>
      <rect class="panel2" x="0" y="44" width="278" height="34" rx="12"/><circle cx="18" cy="61" r="6" fill="#8B5CF6"/><text class="tiny text" x="34" y="62" dominant-baseline="middle">OpenCode</text><text class="tiny muted" x="210" y="62" dominant-baseline="middle">4.9M</text>
      <rect class="panel2" x="0" y="88" width="278" height="34" rx="12"/><circle cx="18" cy="105" r="6" fill="#22C55E"/><text class="tiny text" x="34" y="106" dominant-baseline="middle">Claude Code</text><text class="tiny muted" x="210" y="106" dominant-baseline="middle">5.8M</text>
      <rect class="panel2" x="0" y="132" width="278" height="34" rx="12"/><circle cx="18" cy="149" r="6" fill="#FBBF24"/><text class="tiny text" x="34" y="150" dominant-baseline="middle">Custom JSONL</text><text class="tiny muted" x="210" y="150" dominant-baseline="middle">1.5M</text>
    </g>
  </g>

  <g transform="translate(84 552)">
    <rect class="panel" x="0" y="0" width="1000" height="78" rx="22"/>
    <text class="tiny muted" x="24" y="26">Top models</text>
    <text class="mono text" x="24" y="54">gpt-5-codex · claude-sonnet · qclaw-model · local-agent</text>
    <text class="tiny muted" x="650" y="26">Export</text>
    <text class="mono green" x="650" y="54">text · json · csv</text>
    <text class="tiny muted" x="828" y="26">Storage</text>
    <text class="mono cyan" x="828" y="54">read-only local files</text>
  </g>
</svg>
